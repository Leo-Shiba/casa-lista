<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#E9EDE5" />
<link rel="apple-touch-icon" href="/icon.svg" />
<title>Casa Nova — Demonstração</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#E9EDE5; --surface:#FBFAF5; --surfaceAlt:#F1F0E8; --ink:#1E3A2B;
  --inkSoft:#5C6B5E; --line:#D6DBCF; --accent:#BC6A38; --accentSoft:#EBD7C6;
  --done:#3E7A4F; --doneBg:#E2EDE2; --warn:#9A4A2E;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:'Inter',ui-sans-serif,system-ui,sans-serif;
  padding-bottom:env(safe-area-inset-bottom)}
.wrap{max-width:760px;margin:0 auto;padding:32px 18px 48px}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}

/* tela de entrada */
#gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.gate-card{background:var(--surface);border:1px solid var(--line);border-radius:24px;
  padding:32px;max-width:360px;width:100%;text-align:center}
.gate-card h1{font-family:'Fraunces',serif;font-weight:600;font-size:30px;margin:8px 0 4px}
.gate-card p.desc{color:var(--inkSoft);font-size:14px;margin:0 0 20px}
.gate-card input+input{margin-top:8px}

/* header */
.eyebrow{font-size:12px;letter-spacing:.18em;font-weight:600;color:var(--accent)}
h1.title{font-family:'Fraunces',serif;font-weight:600;font-size:44px;line-height:1.05;margin:4px 0 0}
.progress-card{margin-top:20px;background:var(--surface);border:1px solid var(--line);
  border-radius:18px;padding:16px}
.bar{height:10px;border-radius:99px;background:var(--surfaceAlt);overflow:hidden;margin-top:6px}
.bar>div{height:100%;border-radius:99px;background:var(--done);transition:width .5s}
.muted{color:var(--inkSoft)}

/* inputs */
input,select{font-family:inherit;font-size:15px;color:var(--ink);background:var(--surfaceAlt);
  border:1px solid var(--line);border-radius:12px;padding:11px 12px;outline:none;width:100%}
input::placeholder{color:var(--inkSoft);opacity:.7}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accentSoft)}
button{font-family:inherit;cursor:pointer;border:none}
.btn-primary{background:var(--ink);color:var(--surface);border-radius:12px;
  padding:11px 16px;font-weight:600;font-size:15px}

.add-card{background:var(--surface);border:1px solid var(--line);border-radius:18px;
  padding:14px;margin:24px 0 20px}
.row{display:flex;gap:8px}
.extras{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.extras .full{grid-column:1/-1}
.link-toggle{background:none;color:var(--accent);font-size:12px;font-weight:500;
  padding:8px 0 0;display:inline-block}

/* filtros */
.filters{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:20px}
.chip{background:var(--surface);color:var(--inkSoft);border:1px solid var(--line);
  border-radius:99px;padding:7px 14px;font-size:14px;font-weight:500}
.chip.on{background:var(--ink);color:var(--surface);border-color:var(--ink)}
.search{position:relative;margin-left:auto}
.search input{padding-left:32px;width:170px}
.search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--inkSoft)}

/* grupos e cards */
.group-head{display:flex;align-items:center;gap:8px;margin:24px 0 10px}
.group-head h2{font-size:13px;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin:0}
.group-head .rule{flex:1;height:1px;background:var(--line)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:18px;
  padding:12px;display:flex;gap:12px;margin-bottom:10px}
.card.done{background:var(--doneBg);opacity:.85}
.check{width:26px;height:26px;border-radius:8px;border:2px solid var(--inkSoft);
  background:transparent;flex:none;margin-top:2px;display:flex;align-items:center;justify-content:center}
.check.on{background:var(--done);border-color:var(--done)}
.thumb{width:56px;height:56px;border-radius:12px;object-fit:cover;border:1px solid var(--line);flex:none}
.thumb.ph{background:var(--surfaceAlt);display:flex;align-items:center;justify-content:center;color:var(--inkSoft)}
.body{flex:1;min-width:0}
.name{font-weight:600;font-size:15px;line-height:1.3;word-break:break-word}
.name.done{text-decoration:line-through;color:var(--inkSoft)}
.meta{display:flex;flex-wrap:wrap;gap:4px 12px;margin-top:4px;font-size:14px;color:var(--inkSoft)}
.meta .price{color:var(--ink);font-weight:500}
.meta a{color:var(--accent);font-weight:500;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.acts{display:flex;flex-direction:column;gap:6px;flex:none}
.ico{width:32px;height:32px;border-radius:10px;background:var(--surfaceAlt);
  border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--inkSoft)}
.ico.danger{color:var(--warn)}

/* vazio */
.empty{text-align:center;padding:56px 16px;background:var(--surface);
  border:1px dashed var(--line);border-radius:18px}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(30,58,43,.4);display:flex;
  align-items:flex-end;justify-content:center;padding:12px;z-index:50}
@media(min-width:640px){.overlay{align-items:center}}
.modal{background:var(--surface);border-radius:20px;padding:18px;width:100%;max-width:420px}
.modal h3{margin:0 0 14px;font-size:18px}
.modal .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.modal>*+*{margin-top:8px}
.hide{display:none!important}
.foot{text-align:center;font-size:12px;color:var(--inkSoft);margin-top:36px;display:flex;align-items:center;justify-content:center;gap:12px}
.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:var(--ink);
  color:var(--surface);padding:10px 18px;border-radius:99px;font-size:14px;z-index:60;opacity:0;
  transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- TELA DE ENTRADA -->
<div id="gate">
  <div class="gate-card">
    <div class="eyebrow">CASA NOVA</div>
    <h1 id="gateTitle">Entrar</h1>
    <p class="desc" id="gateDesc">Acesse a lista da sua casa.</p>
    <input id="userInput" type="text" placeholder="Usuário" autocomplete="username" />
    <input id="passInput" type="password" placeholder="Senha" autocomplete="current-password" onkeydown="if(event.key==='Enter')submitGate()" />
    <button class="btn-primary" style="width:100%;margin-top:12px" onclick="submitGate()" id="gateBtn">Entrar</button>
    <button class="link-toggle" style="margin-top:10px;width:100%" onclick="toggleMode()" id="modeToggle">Não tem conta? Criar conta</button>
    <p id="gateErr" style="color:var(--warn);margin:12px 0 0;min-height:18px;font-size:13px"></p>
  </div>
</div>

<!-- APP -->
<div id="app" class="wrap hide">
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div>
      <div class="eyebrow">INVENTÁRIO · casa nova</div>
      <h1 class="title">O que falta comprar</h1>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
      <span id="userLabel" style="font-size:13px;color:var(--inkSoft)"></span>
      <button class="ico" onclick="logout()" title="Sair" aria-label="sair">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>

  <div class="progress-card">
    <div style="display:flex;justify-content:space-between;align-items:flex-end">
      <span class="muted"><strong id="pBought" style="color:var(--ink)">0</strong> de <span id="pTotal">0</span> comprados</span>
      <strong id="pPct" style="color:var(--done)">0%</strong>
    </div>
    <div class="bar"><div id="pBar" style="width:0%"></div></div>
    <div style="display:flex;gap:20px;margin-top:12px;font-size:14px">
      <div><span class="muted">Falta gastar </span><strong id="pRemaining">—</strong></div>
      <div><span class="muted">Já gasto </span><strong id="pSpent">—</strong></div>
    </div>
  </div>

  <div class="add-card">
    <div class="row">
      <input id="addName" placeholder="Adicionar item (ex: mesa de jantar)" onkeydown="if(event.key==='Enter')addItem()" />
      <button class="btn-primary" style="flex:none" onclick="addItem()">+ Add</button>
    </div>
    <button class="link-toggle" onclick="toggleExtras()" id="extrasBtn">+ cômodo, preço, link e imagem</button>
    <div class="extras hide" id="extras">
      <select id="addRoom"></select>
      <input id="addPrice" placeholder="Preço estimado (ex: 299,90)" />
      <input id="addUrl" class="full" placeholder="Link da loja" />
      <input id="addImage" class="full" placeholder="URL da imagem (botão direito na foto › copiar endereço)" />
    </div>
  </div>

  <div class="filters">
    <button class="chip on" data-f="todos" onclick="setFilter('todos')">Tudo</button>
    <button class="chip" data-f="abertos" onclick="setFilter('abertos')">A comprar</button>
    <button class="chip" data-f="comprados" onclick="setFilter('comprados')">Comprados</button>
    <div class="search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" placeholder="Buscar" oninput="render()" />
    </div>
  </div>

  <div id="list"></div>
  <p class="foot">Lista compartilhada · salva no servidor</p>
</div>

<!-- MODAL -->
<div id="modal" class="overlay hide" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>Editar item</h3>
    <input id="eName" placeholder="Nome" />
    <div class="grid2">
      <select id="eRoom"></select>
      <input id="ePrice" placeholder="Preço" />
    </div>
    <input id="eUrl" placeholder="Link da loja" />
    <input id="eImage" placeholder="URL da imagem" />
    <button class="btn-primary" style="width:100%;margin-top:14px" onclick="saveEdit()">Salvar</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const ROOMS=["Sala","Cozinha","Quarto","Banheiro","Escritório","Área externa","Geral"];
const roomOrder=r=>{const i=ROOMS.indexOf(r);return i===-1?50:i};
const DEMO_ITEMS=[
  {id:"d1",name:"Sofá retrátil 3 lugares",room:"Sala",price:2499.90,url:"https://exemplo.com/sofa",image:"",bought:false},
  {id:"d2",name:"Smart TV 55\" 4K",room:"Sala",price:2899.00,url:"https://exemplo.com/tv",image:"",bought:true},
  {id:"d3",name:"Rack para TV",room:"Sala",price:649.00,url:"",image:"",bought:false},
  {id:"d4",name:"Mesa de jantar 6 lugares",room:"Cozinha",price:1299.00,url:"https://exemplo.com/mesa",image:"",bought:false},
  {id:"d5",name:"Jogo de panelas antiaderente",room:"Cozinha",price:459.90,url:"",image:"",bought:true},
  {id:"d6",name:"Geladeira frost free",room:"Cozinha",price:3199.00,url:"https://exemplo.com/geladeira",image:"",bought:false},
  {id:"d7",name:"Cama box casal",room:"Quarto",price:1899.00,url:"",image:"",bought:false},
  {id:"d8",name:"Guarda-roupa 6 portas",room:"Quarto",price:1650.00,url:"https://exemplo.com/guarda-roupa",image:"",bought:true},
  {id:"d9",name:"Kit 4 toalhas de banho",room:"Banheiro",price:189.90,url:"",image:"",bought:true},
  {id:"d10",name:"Espelho com moldura",room:"Banheiro",price:249.00,url:"",image:"",bought:false},
  {id:"d11",name:"Cadeira de escritório ergonômica",room:"Escritório",price:799.00,url:"https://exemplo.com/cadeira",image:"",bought:false},
  {id:"d12",name:"Churrasqueira a carvão",room:"Área externa",price:349.90,url:"",image:"",bought:false}
];
let _demoSeq=100;
let state={items:JSON.parse(JSON.stringify(DEMO_ITEMS)),token:"demo",username:"você",filter:"todos",editId:null,mode:"login"};

const parseBRL=s=>{if(s==null||s==="")return null;const n=parseFloat(String(s).replace(/[^\d,.-]/g,"").replace(/\./g,"").replace(",","."));return isNaN(n)?null:n};
const fmtBRL=n=>n==null?"":n.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const esc=s=>(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1800)}

[document.getElementById("addRoom"),document.getElementById("eRoom")].forEach(sel=>{
  sel.innerHTML=ROOMS.map(r=>`<option value="${r}">${r}</option>`).join("");
});

// DEMO: sem backend — tudo funciona localmente, nada é salvo no servidor.
async function api(method,path,body){
  if(method==="POST"&&path==="/items"){return {id:"d"+(_demoSeq++),bought:false,...body}}
  return {};
}

// ---- gate ----
function toggleMode(){
  state.mode=state.mode==="login"?"register":"login";
  const isReg=state.mode==="register";
  document.getElementById("gateTitle").textContent=isReg?"Criar conta":"Entrar";
  document.getElementById("gateDesc").textContent=isReg?"Crie sua conta para começar.":"Acesse a lista da sua casa.";
  document.getElementById("gateBtn").textContent=isReg?"Criar conta":"Entrar";
  document.getElementById("modeToggle").textContent=isReg?"Já tem conta? Entrar":"Não tem conta? Criar conta";
  document.getElementById("passInput").autocomplete=isReg?"new-password":"current-password";
  document.getElementById("gateErr").textContent="";
}

async function submitGate(){
  const username=document.getElementById("userInput").value.trim();
  const password=document.getElementById("passInput").value;
  const err=document.getElementById("gateErr");
  err.textContent="";
  if(!username||!password){err.textContent="Preencha usuário e senha.";return}
  const endpoint=state.mode==="register"?"/register":"/login";
  try{
    const res=await fetch("/api"+endpoint,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username,password})});
    const data=await res.json();
    if(!res.ok){err.textContent=data.erro||"Erro ao entrar.";return}
    state.token=data.token;
    state.username=data.username;
    localStorage.setItem("casaToken",data.token);
    localStorage.setItem("casaUser",data.username);
    showApp();
  }catch{err.textContent="Erro de conexão."}
}

function logout(){
  localStorage.removeItem("casaToken");
  localStorage.removeItem("casaUser");
  state.token="";state.username="";state.items=[];
  document.getElementById("app").classList.add("hide");
  document.getElementById("gate").classList.remove("hide");
  document.getElementById("userInput").value="";
  document.getElementById("passInput").value="";
  document.getElementById("gateErr").textContent="";
}

function showApp(){
  document.getElementById("gate").classList.add("hide");
  document.getElementById("app").classList.remove("hide");
  document.getElementById("userLabel").textContent=state.username;
  load();
}

async function load(){render()}

// ---- ações ----
async function addItem(){
  const name=document.getElementById("addName").value.trim();
  if(!name)return;
  const body={name,room:document.getElementById("addRoom").value,
    price:parseBRL(document.getElementById("addPrice").value),
    url:document.getElementById("addUrl").value.trim(),
    image:document.getElementById("addImage").value.trim()};
  const item=await api("POST","/items",body);
  state.items.unshift(item);
  ["addName","addPrice","addUrl","addImage"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("extras").classList.add("hide");
  render();
}
async function toggleBought(id){
  const it=state.items.find(i=>i.id===id);it.bought=!it.bought;render();
  await api("PUT","/items/"+id,{bought:it.bought});
}
async function removeItem(id){
  state.items=state.items.filter(i=>i.id!==id);render();
  await api("DELETE","/items/"+id);
}
function openEdit(id){
  const it=state.items.find(i=>i.id===id);state.editId=id;
  document.getElementById("eName").value=it.name;
  document.getElementById("eRoom").value=it.room;
  document.getElementById("ePrice").value=it.price!=null?String(it.price).replace(".",","):"";
  document.getElementById("eUrl").value=it.url||"";
  document.getElementById("eImage").value=it.image||"";
  document.getElementById("modal").classList.remove("hide");
}
function closeModal(){document.getElementById("modal").classList.add("hide");state.editId=null}
async function saveEdit(){
  const id=state.editId;const it=state.items.find(i=>i.id===id);
  const body={name:document.getElementById("eName").value.trim()||it.name,
    room:document.getElementById("eRoom").value,
    price:parseBRL(document.getElementById("ePrice").value),
    url:document.getElementById("eUrl").value.trim(),
    image:document.getElementById("eImage").value.trim()};
  Object.assign(it,body);render();closeModal();
  await api("PUT","/items/"+id,body);
}
function setFilter(f){state.filter=f;document.querySelectorAll(".chip").forEach(c=>c.classList.toggle("on",c.dataset.f===f));render()}
function toggleExtras(){document.getElementById("extras").classList.toggle("hide")}

// ---- render ----
function render(){
  const q=document.getElementById("search").value.trim().toLowerCase();
  const all=state.items;
  const total=all.length, bought=all.filter(i=>i.bought).length;
  const remaining=all.filter(i=>!i.bought).reduce((s,i)=>s+(i.price||0),0);
  const spent=all.filter(i=>i.bought).reduce((s,i)=>s+(i.price||0),0);
  const pct=total?Math.round(bought/total*100):0;
  document.getElementById("pBought").textContent=bought;
  document.getElementById("pTotal").textContent=total;
  document.getElementById("pPct").textContent=pct+"%";
  document.getElementById("pBar").style.width=pct+"%";
  document.getElementById("pRemaining").textContent=fmtBRL(remaining)||"—";
  document.getElementById("pSpent").textContent=fmtBRL(spent)||"—";

  let items=all.filter(i=>state.filter==="todos"?true:state.filter==="comprados"?i.bought:!i.bought)
    .filter(i=>q?(i.name+" "+i.room).toLowerCase().includes(q):true);

  const list=document.getElementById("list");
  if(all.length===0){list.innerHTML=`<div class="empty"><div style="font-size:26px">🛒</div><p style="font-weight:600;margin:8px 0 2px">Lista vazia</p><p class="muted" style="margin:0;font-size:14px">Adicione o primeiro item lá em cima.</p></div>`;return}
  if(items.length===0){list.innerHTML=`<p class="muted" style="text-align:center;padding:32px;font-size:14px">Nada por aqui com esse filtro.</p>`;return}

  const groups={};items.forEach(i=>{(groups[i.room]=groups[i.room]||[]).push(i)});
  const ordered=Object.entries(groups).sort((a,b)=>roomOrder(a[0])-roomOrder(b[0]));

  list.innerHTML=ordered.map(([room,arr])=>`
    <div class="group-head"><h2>${room}</h2><span class="muted" style="font-size:12px">${arr.length}</span><div class="rule"></div></div>
    ${arr.map(it=>cardHTML(it)).join("")}
  `).join("");
}

function cardHTML(it){
  const thumb=it.image
    ? `<img class="thumb" src="${esc(it.image)}" alt="" onerror="this.outerHTML='<div class=&quot;thumb ph&quot;>📦</div>'">`
    : `<div class="thumb ph">📦</div>`;
  return `
  <div class="card ${it.bought?"done":""}">
    <button class="check ${it.bought?"on":""}" onclick="toggleBought('${it.id}')" aria-label="comprado">
      ${it.bought?'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg>':""}
    </button>
    ${thumb}
    <div class="body">
      <div class="name ${it.bought?"done":""}">${esc(it.name)}</div>
      <div class="meta">
        ${it.price!=null?`<span class="price">${fmtBRL(it.price)}</span>`:""}
        ${it.url?`<a href="${esc(it.url)}" target="_blank" rel="noreferrer"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>loja</a>`:""}
      </div>
    </div>
    <div class="acts">
      <button class="ico" onclick="openEdit('${it.id}')" aria-label="editar"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>
      <button class="ico danger" onclick="removeItem('${it.id}')" aria-label="excluir"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>
    </div>
  </div>`;
}

// ---- boot (DEMO: entra direto no app, sem tela de login) ----
showApp();
</script>
</body>
</html>
